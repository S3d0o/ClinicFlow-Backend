services:

  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: clinicflow-db
    environment:
      SA_PASSWORD: ${DB_PASSWORD}
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - clinicflow_data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P ${DB_PASSWORD} -Q 'SELECT 1' -C"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  backend:
    image: clinicflow-backend
    container_name: clinicflow-backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      ConnectionStrings__DefaultConnection: "Server=db;Database=ClinicFlow;User Id=sa;Password=${DB_PASSWORD};MultipleActiveResultSets=true;TrustServerCertificate=True"
      ASPNETCORE_ENVIRONMENT: "Production"
      ASPNETCORE_URLS: "http://+:8080"
      JwtSettings__Secret: ${JWT_SECRET}
      JwtSettings__Issuer: "http://backend:8080"
      JwtSettings__Audience: "http://localhost:3000"
      JwtSettings__AccessTokenExpirationMinutes: "15"
      JwtSettings__RefreshTokenExpirationDays: "7"
      JwtSettings__TheftDetectionWindowMinutes: "5"
      EmailSettings__Username: ${EMAIL_USERNAME}
      EmailSettings__Password: ${EMAIL_PASSWORD}
    ports:
      - "5001:8080"

  frontend:
    image: clinicflow-frontend
    container_name: clinicflow-frontend
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  clinicflow_data: